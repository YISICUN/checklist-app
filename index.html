<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>我的待办事项清单 (Vue3 响应式版)</title>
    <script src="https://unpkg.com/vue@3.5.40/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios@1.7.2/dist/axios.min.js"></script>
    <script src="js/api.js"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="shortcut icon" href="assets/images/favicon.ico" type="image/x-icon">
    <link rel="icon" sizes="32x32" href="assets/images/favicon.ico">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7f6;
            margin: 40px;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h2 {
            border-bottom: 2px solid #2ecc71;
            padding-bottom: 10px;
            color: #2c3e50;
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            margin: 8px 0;
            background: #fafafa;
            border-radius: 4px;
            border-left: 4px solid #3498db;
            transition: all 0.3s ease;
            /* 增加平滑过渡效果 */
        }

        /* 状态为已完成时的卡片样式 */
        .completed {
            border-left-color: #bdc3c7;
            background: #f0f0f0;
        }

        /* 状态为已完成时的文字删除线 */
        .completed .title {
            text-decoration: line-through;
            color: #7f8c8d;
        }

        button {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #c0392b;
        }

        /* 复选框样式微调 */
        .todo-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
            margin-right: 12px;
        }

        .updating {
            background-color: #ffe6e6 !important;
            /* 极淡的红色背景 */
            border-left: 4px solid #e74c3c !important;
            /* 醒目的红色左边框 */
            transition: all 0.5s ease;
        }

        .daily-label {
            position: relative;
            z-index: 10;
            pointer-events: auto;
            /* 显式开启鼠标事件 */
        }
    </style>
</head>

<body>

    <div id="app" class="container">

        <div class="header"
            style="display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #fff; border-bottom: 1px solid #eee;">
            <h2 style="margin: 0;">📋 我的待办事项清单</h2>

            <button @click="logout"
                style="background: #e74c3c; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 14px;">
                退出登录
            </button>
        </div>

        <div class="category-tabs"
            style="display: flex; gap: 20px; margin-bottom: 20px; border-bottom: 2px solid #e0e0e0; padding-bottom: 10px;">
            <div v-for="cat in categories" :key="cat.id" @click="activeCategory = cat" :style="{ 
            cursor: 'pointer', 
            fontWeight: activeCategory.id === cat.id ? 'bold' : 'normal',
            color: activeCategory.id === cat.id ? '#3498db' : '#7f8c8d',
            borderBottom: activeCategory.id === cat.id ? '2px solid #3498db' : 'none'}">
                {{ cat.name }}
            </div>
        </div>

        <div style="margin-bottom: 20px;">
            <input type="text" v-model.trim="newTodoTitle" @keyup.enter="addTodo" placeholder="输入新的待办任务..."
                style="padding: 8px; width: 70%;">
            <button @click="addTodo" style="background: #2ecc71; margin-left: 8px;">添加任务</button>
        </div>

        <div id="todo-list">
            <p v-if="loading" style="color: #3498db;">正在加载云端数据...</p>

            <p v-else-if="filteredTodoList.length === 0" style="color: #7f8c8d;">目前没有任务，快去添加一个吧！</p>
            <div v-else v-for="item in filteredTodoList" :key="item.id" class="item"
                :class="{ completed: item.isCompleted === 1, updating: item.isUpdating }">

                <div style="display: flex; align-items: center; flex: 1;">
                    <input type="checkbox" class="todo-checkbox" v-model="item.isCompleted" :true-value="1"
                        :false-value="0" @change="handleStatusToggle(item)" />

                    <span class="title" @click="updateTodoTitle(item)" style="cursor:pointer; flex: 1;">
                        <strong>{{ item.title }}</strong>
                    </span>
                </div>

                <div style="margin-left: auto; display: flex; gap: 10px;">

                    <div class="time-selector">

                        <span v-if="item.dueDate === '2111-11-11'" class="daily-label">
                            <button type="button" @click.stop="updateToday(item)" style="cursor:pointer; 
                                border:none; 
                                background:transparent; 
                                padding:0; 
                                margin:0; 
                                font-size: inherit; 
                                color: inherit; 
                                text-decoration: underline;">
                                每日
                            </button>
                        </span>

                        <!-- <input v-else type="date" v-model="item.dueDate" @change="updateTime(item)" -->
                        <input v-else type="date" v-model="item.dueDate" @input="handleDateClear($event, item)"
                            style="padding: 4px; border: 1px solid #ccc; border-radius: 4px;" />
                        <select v-model="item.startTime" @change="updateTime(item)" style="padding: 4px;">
                            <option v-for="time in timeOptions" :key="time" :value="time">{{ time }}</option>
                        </select>
                    </div>

                    <!-- <button @click="moveTask(item, 'top')" style="background: #95a5a6; padding: 2px 6px;">置顶</button> -->
                    <!-- <button @click="moveTask(item, 'up')" style="background: #95a5a6; padding: 2px 6px;">↑</button> -->
                    <!-- <button @click="moveTask(item, 'down')" style="background: #95a5a6; padding: 2px 6px;">↓</button> -->
                    <!-- <button @click="moveTask(item, 'bottom')" style="background: #95a5a6; padding: 2px 6px;">置底</button> -->

                    <button @click="openUpdateDialog(item)" style="background: #3498db; padding: 2px 6px;">改</button>
                    <button @click="deleteTodo(item.id)" style="background: #e74c3c; padding: 2px 6px;">删</button>
                </div>
            </div>

            <div class="toolbar">
                <button @click="toggleAllStatus" style="background: #2ecc71; margin-left: 8px;">
                    {{ filteredTodoList.some(i => i.isCompleted === 0) ? '全选已完成' : '全部重置' }}
                </button>
            </div>

        </div>

        <dialog id="updateDialog" style="border: 1px solid #ccc; border-radius: 8px; padding: 20px;">
            <form method="dialog">
                <h3>修改任务</h3>
                <p>内容: <input id="newTitleInput" type="text" /></p>
                <p>分类:
                    <select id="newCategorySelect">
                        <option v-for="cat in categories" :key="cat.id" :value="cat.id">{{ cat.name }}</option>
                    </select>
                </p>
                <div style="text-align: right;">
                    <button @click="saveUpdate">确认修改</button>
                    <button>取消</button>
                </div>
            </form>
        </dialog>

        <dialog ref="dateDialog" style="border: 1px solid #ccc; border-radius: 8px; padding: 20px;">
            <form method="dialog">
                <h3>修改任务截止日期</h3>
                <p>输入日期 (YYYY-MM-DD):</p>
                <input v-model="tempDate" type="text" placeholder="2026-07-15" />
                <div style="margin-top: 15px; text-align: right;">
                    <button @click="confirmDateUpdate">OK</button>
                    <button>Cancel</button>
                </div>
            </form>
        </dialog>

    </div>

    <script>
        const { createApp, ref, onMounted, computed } = Vue;

        // 使用反引号 (backticks) 来拼接 后端基础 API 路径
        const BASE_URL_item = `${BASE_URL}/item`;
        const BASE_URL_category = `${BASE_URL}/category`;

        createApp({
            setup() {
                // 定义响应式状态
                const todoList = ref([]);
                const newTodoTitle = ref('');
                const loading = ref(true);

                // 在 setup() 中定义分类
                // 1. 响应式存储后端分类
                const dbCategories = ref([]);

                // 2. 构造一个包含“全部”的完整分类列表
                const categories = computed(() => {
                    // id: 0 代表“全部”
                    // console.log("计算属性 categories 被访问，当前 dbCategories: " + JSON.stringify(dbCategories.value));
                    return [{ id: 0, name: '全部' }, ...dbCategories.value];
                });

                // 3. 选中项存储的是整个对象，不仅仅是 id
                const activeCategory = ref({ id: 0, name: '全部' }); // 当前选中的分类

                // 🔍 查询全件 (GET)
                const loadTodos = async () => {
                    loading.value = true;
                    try {
                        const response = await request.get('/item/list');

                        const storedId = sessionStorage.getItem('highlight_id');
                        const expiry = sessionStorage.getItem('highlight_expiry');
                        const now = Date.now();

                        if (response.data.code === 200) {
                            todoList.value = response.data.data.map(item => {

                                // 清洗时间：强制转为 HH:mm 格式
                                let cleanTime = '-';
                                if (item.startTime && item.startTime !== '-') {

                                    // 如果包含秒，只截取前5位
                                    cleanTime = item.startTime.substring(0, 5);
                                }

                                // 判断：如果有存储的ID，且没过期，则设为 true
                                const shouldHighlight = (storedId == item.id && now < expiry);

                                if (shouldHighlight) {
                                    setTimeout(() => {
                                        item.isUpdating = false;
                                    }, expiry - now); // 剩余多少秒就再标红多少秒
                                }

                                // 如果过期了，清除存储
                                if (now >= expiry) {
                                    sessionStorage.removeItem('highlight_id');
                                    sessionStorage.removeItem('highlight_expiry');
                                }

                                return {
                                    ...item,
                                    startTime: cleanTime,
                                    isUpdating: shouldHighlight // <--- 关键点：提前注入
                                };

                            });
                        } else {
                            alert('数据加载失败：' + response.data.message);
                        }
                    } catch (err) {
                        console.error(err);
                        alert('无法连接到后端服务，请确认后端已启动！');
                    } finally {
                        loading.value = false;
                    }
                };

                // 💡 添加任务 (POST)
                const addTodo = async () => {
                    if (!newTodoTitle.value) return alert('任务名不能为空！');
                    // 1. 获取当前选中的分类 ID
                    let targetCategoryId = activeCategory.value.id;

                    console.log("添加任务时，当前选中分类ID:", targetCategoryId, "类型:", typeof targetCategoryId);
                    // 2. 逻辑守门员：如果选中了“全部”(id=0)，则强制将其 ID 改为 1 (未分类)
                    if (targetCategoryId === 0) {
                        targetCategoryId = 1;
                    }
                    try {
                        const response = await request.post('/item/add', {
                            title: newTodoTitle.value,
                            categoryId: targetCategoryId,
                            isCompleted: 0
                        });
                        if (response.data.code === 200) {
                            newTodoTitle.value = ''; // 清空输入框
                            await loadTodos();       // 刷新列表
                        } else {
                            alert('添加失败: ' + response.data.message);
                        }
                    } catch (err) {
                        console.error(err);
                    }
                };

                // 🔄 关键：Checkbox 状态触发变更 (POST/PUT)
                // 对应你之前提及的前后端数据模型转换逻辑
                const handleStatusToggle = async (item) => {
                    try {
                        // 依据你的后端实现，这里将整条 item（包含最新的 isCompleted 数字）传给后端
                        const response = await request.post('/item/update', {
                            id: item.id,
                            title: item.title,
                            isCompleted: item.isCompleted // 此时值已经是自动转换好的 1 或 0
                        });

                        if (response.data.code !== 200) {
                            alert('状态更新失败: ' + response.data.message);
                            // 冗余安全设计（回滚）：后端若失败，前端状态倒腾回去
                            item.isCompleted = item.isCompleted === 1 ? 0 : 1;
                        }
                    } catch (err) {
                        console.error('网络请求失败，状态回滚', err);
                        item.isCompleted = item.isCompleted === 1 ? 0 : 1;
                    }
                };

                // 批量切换状态
                const toggleAllStatus = async () => {
                    // 1. 判断：如果当前列表里有任何一个是未完成的，就全部置为完成；否则全部置为未完成
                    const hasUncompleted = filteredTodoList.value.some(item => item.isCompleted === 0);
                    const newStatus = hasUncompleted ? 1 : 0;

                    // 2. 构造发送给后端的数组
                    // 我们只需要发送包含 id 和目标 isCompleted 的最小化对象集
                    const itemsToUpdate = filteredTodoList.value.map(item => ({
                        id: item.id,
                        isCompleted: newStatus
                    }));

                    try {
                        // 3. 发送批量请求
                        // const response = await axios.post(`${BASE_URL_item}/updateBatch`, itemsToUpdate);
                        // 确保使用配置好的拦截器实例
                        const response = await request.post('/item/updateBatch', itemsToUpdate);

                        // 4. 根据后端返回的 code 处理结果
                        if (response.data.code === 200) {
                            // 批量更新成功：更新本地列表的响应式状态
                            filteredTodoList.value.forEach(item => {
                                item.isCompleted = newStatus;
                            });
                        } else {
                            // 错误处理
                            alert('批量更新失败: ' + response.data.message);
                        }
                    } catch (err) {
                        console.error("网络请求异常:", err);
                        alert("网络波动，请检查连接");
                    }
                };

                // 📝 修改任务文本内容 (POST)
                const updateTodoTitle = async (item) => {
                    const newTitle = prompt("修改任务内容:", item.title);
                    // 逻辑守门员：处理空值、无变化或取消的情况
                    if (newTitle === null || newTitle === item.title || newTitle.trim() === '') return;

                    try {
                        const response = await request.post('/item/update', {
                            id: item.id,
                            title: newTitle,
                            isCompleted: item.isCompleted,
                            categoryId: item.categoryId
                        });
                        if (response.data.code === 200) {
                            await loadTodos(); // 刷新列表
                        } else {
                            alert('修改失败: ' + response.data.message);
                        }
                    } catch (err) {
                        console.error(err);
                    }
                };

                // 💬 修改任务内容和分类的对话框
                // 1. 打开对话框（绑定在你的“改”按钮上）
                const openUpdateDialog = (item) => {
                    const dialog = document.getElementById('updateDialog');
                    // 预填充当前值
                    document.getElementById('newTitleInput').value = item.title;
                    document.getElementById('newCategorySelect').value = item.categoryId;

                    // 暂存当前要修改的 item 对象
                    window.currentItem = item;
                    dialog.showModal();
                };

                // 2. 保存修改（在对话框里的“确认修改”按钮触发）
                const saveUpdate = async () => {
                    const item = window.currentItem;
                    const newTitle = document.getElementById('newTitleInput').value;
                    const newCatId = parseInt(document.getElementById('newCategorySelect').value);

                    // 发送 axios.post 更新
                    await request.post('/item/update', {
                        id: item.id,
                        title: newTitle,
                        categoryId: newCatId,
                        isCompleted: item.isCompleted
                    });
                    await loadTodos();
                };

                // 🗓️ 日期选择器清除事件处理
                const handleDateClear = (event, item) => {
                    // 如果用户点击了清除，event.target.value 会变为空字符串
                    // console.log("日期选择器触发事件，当前event:", event);
                    console.log("日期选择器触发事件，当前值:", event.target.value);
                    if (event.target.value === '') {
                        // 自动重置为特殊标记
                        item.dueDate = '2111-11-11';
                        // console.log("用户清除了日期，自动设置为每日标记:", item.dueDate);
                    }
                    updateDate(item);
                };

                // 💡 修改任务截止日期 (POST)
                // 添加两个变量，用于临时存储
                let editingItem = null;
                const tempDate = ref(''); // 利用现有的 ref 机制绑定 dialog 输入框
                const dateDialog = ref(null); // 对应 <dialog ref="dateDialog">
                const updateToday = (item) => {
                    // 1. 获取当天日期并格式化为 YYYY-MM-DD
                    const today = new Date();
                    const year = today.getFullYear();
                    // getMonth() 从 0 开始，所以要 +1；padStart(2, '0') 保证月和日是两位数
                    const month = String(today.getMonth() + 1).padStart(2, '0');
                    const day = String(today.getDate()).padStart(2, '0');
                    const todayStr = `${year}-${month}-${day}`;

                    // // 2. 使用这个变量
                    // const newDate = prompt("修改任务截止日期 (格式: YYYY-MM-DD):", todayStr);
                    // if (newDate === null || newDate.trim() === '') return;

                    // let finalDate = newDate.trim();
                    // if (finalDate.toLowerCase() === '每日') {
                    //     finalDate = '2111-11-11'; // 特殊标记为每日
                    // }
                    // item.dueDate = finalDate;
                    // updateDate(item);

                    editingItem = item;
                    // 设置默认值为今日
                    tempDate.value = todayStr;

                    // 打开对话框
                    dateDialog.value.showModal();
                };
                // 2. 确认按钮调用的逻辑
                const confirmDateUpdate = async () => {
                    if (editingItem) {
                        editingItem.dueDate = tempDate.value === '每日' ? '2111-11-11' : tempDate.value;
                        await updateDate(editingItem); // 调用你现有的更新函数
                        dateDialog.value.close();
                    }
                };

                // 💡 修改任务截止日期 (POST)
                const updateDate = async (item) => {
                    try {
                        const response = await request.post('/item/update', {
                            id: item.id,
                            title: item.title,
                            isCompleted: item.isCompleted,
                            dueDate: item.dueDate,
                            startTime: item.startTime
                        });
                        if (response.data.code === 200) {
                            await loadTodos(); // 刷新列表
                        } else {
                            alert('修改失败: ' + response.data.message);
                        }
                    } catch (err) {
                        console.error(err);
                    }
                };

                // 🗑️ 删除任务 (DELETE)
                const deleteTodo = async (id) => {
                    if (confirm('确定要斩断这条任务的因果（删除）吗？')) {
                        try {
                            const response = await request.delete(`/item/delete/${id}`);
                            if (response.data.code === 200) {
                                await loadTodos(); // 刷新列表
                            } else {
                                alert(response.data.message);
                            }
                        } catch (err) {
                            console.error(err);
                        }
                    }
                };

                // 时间选择器选项生成（每半小时一个选项）
                const timeOptions = [];
                for (let h = 0; h < 24; h++) {
                    for (let m = 0; m < 60; m += 30) {
                        const hour = h.toString().padStart(2, '0');
                        const minute = m.toString().padStart(2, '0');
                        timeOptions.push(`${hour}:${minute}`);
                    }
                }

                // 统一的更新时间逻辑
                const updateTime = async (item) => {
                    // 1. 立即给该项设置标红状态
                    item.isUpdating = true;

                    // 存入当前时间戳，确保能记录是哪一个被更新了
                    sessionStorage.setItem('highlight_id', item.id);
                    sessionStorage.setItem('highlight_expiry', Date.now() + 5000); // 5秒后过期

                    try {
                        await request.post('/item/update', {
                            id: item.id,
                            title: item.title,
                            isCompleted: item.isCompleted,
                            dueDate: item.dueDate,
                            startTime: item.startTime
                        });

                        // 2. 标红 5 秒后恢复
                        setTimeout(() => {
                            item.isUpdating = false;
                        }, 5000);

                        // 3. 排序重排：刷新列表
                        // 注意：因为刷新会导致 DOM 重绘，只要 item 对象在列表里，状态就会保留
                        await loadTodos();

                    } catch (err) {
                        alert("时间更新失败: " + err.message);
                    }
                };

                // 更换排序
                const moveTask = async (item, type) => {
                    // alert(`移动任务ID=${item.id}，类型=${type}`);
                    const idx = todoList.value.findIndex(t => t.id === item.id);
                    let prevOrder = null;
                    let nextOrder = null;

                    if (type === 'top') {
                        // 置顶：prev为null，next为当前列表第一个的sortOrder
                        nextOrder = todoList.value[0].sortOrder;
                    } else if (type === 'bottom') {
                        // 置底：prev为当前列表最后一个的sortOrder，next为null
                        prevOrder = todoList.value[todoList.value.length - 1].sortOrder;
                    } else if (type === 'up' && idx > 0) {
                        // 上移：prev为idx-2的，next为idx-1的
                        prevOrder = idx > 1 ? todoList.value[idx - 2].sortOrder : null;
                        nextOrder = todoList.value[idx - 1].sortOrder;
                    } else if (type === 'down' && idx < todoList.value.length - 1) {
                        // 下移：prev为idx+1的，next为idx+2的
                        prevOrder = todoList.value[idx + 1].sortOrder;
                        nextOrder = idx < todoList.value.length - 2 ? todoList.value[idx + 2].sortOrder : null;
                    } else {
                        // 边界情况提示
                        if (type === 'up' || type === 'top') {
                            alert("已经是顶部啦，不能再往上移动了！");
                        } else if (type === 'down' || type === 'bottom') {
                            alert("已经是底部啦，不能再往下移动了！");
                        }
                        return; // 已在边界或非法操作
                    }

                    try {
                        await axios.post(`${BASE_URL_item}/move`, {
                            targetId: item.id,
                            prevOrder: prevOrder,
                            nextOrder: nextOrder
                        });
                        await loadTodos(); // 重新加载数据刷新列表
                    } catch (e) {
                        alert("移动失败: " + e.message);
                    }
                };

                // 计算属性：根据 activeCategory 过滤 todoList
                const filteredTodoList = computed(() => {
                    focusInput();
                    if (activeCategory.value.id === 0) {
                        return todoList.value;
                    }
                    return todoList.value.filter(item => item.categoryId === activeCategory.value.id);
                });

                // 1. 在 setup 最外部或者 mount 之前定义 request
                const request = axios.create({
                    baseURL: 'https://checklist-backend-bqsf.onrender.com/api'
                });

                // 2. 拦截器只注册一次，全局生效
                request.interceptors.request.use(config => {
                    const userId = localStorage.getItem('userId');
                    if (userId) {
                        config.headers['userId'] = userId;
                    }
                    return config;
                }, error => Promise.reject(error));

                // 3. 在 setup 内部使用 request
                const loadCategories = async () => {
                    try {
                        // 直接使用定义好的 request 实例
                        const res = await request.get('/category/list');
                        dbCategories.value = res.data;

                        if (activeCategory.value.id !== 0) {
                            const restored = dbCategories.value.find(c => c.id === activeCategory.value.id);
                            if (restored) activeCategory.value = restored;
                        }
                    } catch (error) {
                        console.error("加载分类失败", error);
                    }
                };

                // 退出登录函数
                const logout = () => {
                    if (confirm("确定要退出登录吗？")) {
                        // 1. 清除本地存储的 userId
                        localStorage.removeItem('userId');

                        // 2. 跳转回登录页
                        window.location.href = 'login.html';
                    }
                };

                // 强制聚焦输入框函数
                const focusInput = () => {
                    // 💡 新增：强制聚焦到输入框
                    setTimeout(() => {
                        const input = document.querySelector('input[type="text"]');
                        if (input) {
                            input.focus();
                        }
                    }, 500); // 延迟 500ms，确保数据加载完成且 DOM 渲染完毕
                };

                // 生命周期钩子：挂载完成时加载数据
                onMounted(() => {
                    // 🛡️ 登录校验：如果没找到登录信息，直接重定向
                    if (!localStorage.getItem('userId')) {
                        alert("请先登录！");
                        window.location.href = 'login.html';
                        return;
                    }

                    loadCategories();
                    loadTodos();
                    focusInput();
                });

                // 将模版需要使用的变量和函数暴露出去
                return {
                    todoList,
                    newTodoTitle,
                    loading,
                    categories,
                    activeCategory,
                    addTodo,
                    handleStatusToggle,
                    toggleAllStatus,
                    updateTodoTitle,
                    openUpdateDialog,
                    saveUpdate,
                    handleDateClear,
                    dateDialog,
                    tempDate,
                    updateToday,
                    confirmDateUpdate,
                    updateDate,
                    deleteTodo,
                    timeOptions,
                    updateTime,
                    logout,
                    moveTask,
                    filteredTodoList,
                    focusInput
                };
            }
        }).mount('#app'); // 挂载容器
    </script>
</body>

</html>
