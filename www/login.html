<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>登录 - 待办事项系统</title>
    <script src="https://unpkg.com/vue@3.5.40/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios@1.7.2/dist/axios.min.js"></script>
    <script src="js/api.js"></script>
    <link rel="shortcut icon" href="assets/images/favicon.ico" type="image/x-icon">
    <link rel="icon" sizes="32x32" href="assets/images/favicon.ico">

    <style>
        /* 彻底夺回所有交互权限 */
        body,
        #app,
        form,
        input,
        button,
        a {
            -webkit-app-region: no-drag !important;
            -webkit-user-select: text !important;
        }

        body {
            font-family: sans-serif;
            background: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 300px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #3498db;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div id="app" class="login-container">
        <h2>{{ isUsernameLogin ? '用户名登录' : 'ID 登录' }}</h2>

        <form @submit.prevent="login">
            <input name="loginUsername" ref="userField" v-if="isUsernameLogin" v-model="loginForm.username" type="text"
                placeholder="用户名">
            <input name="loginId" ref="idField" v-else v-model="loginForm.id" type="text" placeholder="用户ID">

            <input name="loginPassword" v-model="loginForm.password" type="password" placeholder="密码">

            <button type="submit" :disabled="isLoading">{{ isLoading ? '登录中...' : '登录' }}</button>
        </form>

        <p @click="toggleLogin" style="cursor:pointer; color:#3498db; text-align:center; font-size:15px;">
            {{ isUsernameLogin ? '切换到ID登录' : '切换到用户名登录' }}
        </p>

        <div style="margin-top: 15px; text-align: center; font-size: 14px; color: #666;">
            还没有账号？<a href="register.html" style="color: #3498db;">立即注册</a>
        </div>
    </div>

    <script>
        const { createApp, reactive, ref, nextTick, onMounted } = Vue;

        createApp({
            setup() {
                const loginForm = reactive({
                    id: '',
                    username: '', // 必须在这里先定义好
                    password: ''
                });
                const isUsernameLogin = Vue.ref(false); // 默认 ID 登录
                const isLoading = ref(false); // 💡 新增状态

                const login = async () => {
                    // 根据当前模式选择发送的字段
                    const payload = isUsernameLogin.value
                        ? { username: loginForm.username, password: loginForm.password }
                        : { id: loginForm.id, password: loginForm.password };

                    if (!payload.password || (!payload.id && !payload.username)) {
                        return alert("请填写完整");
                    }

                    isLoading.value = true; // 💡 设置加载状态

                    try {
                        const res = await axios.post(`${BASE_URL}/auth/login`, payload);
                        if (res.data.code === 200) {
                            localStorage.setItem('userId', res.data.data.id || (isUsernameLogin.value ? loginForm.username : loginForm.id));
                            window.location.href = 'index.html';
                        } else {
                            alert(res.data.message);
                        }
                    } catch (e) {
                        // 1. 判断是否是 Axios 请求错误（即有响应但非 2xx 状态码）
                        if (e.response) {
                            const { status, data } = e.response;

                            // 2. 根据状态码给予更准确的反馈
                            if (status === 401) {
                                alert("登录失败: ID 或密码不正确");
                            } else if (status === 404) {
                                alert("登录失败: 登录接口不存在，请检查后端路径");
                            } else if (data && data.message) {
                                // 如果后端返回了标准的错误对象（如 {code: 500, message: "xxx"}）
                                alert("错误: " + data.message);
                            } else {
                                alert(`请求错误 (状态码: ${status})`);
                            }
                        } else if (e.request) {
                            // 3. 请求发出去了，但没收到响应（可能是网络断了或后端服务崩溃）
                            alert("无法连接到服务器，请检查网络或后端是否启动");
                        } else {
                            // 4. 其他代码逻辑错误
                            console.error("代码运行错误:", e);
                            alert("系统异常，请查看控制台日志");
                        }
                    } finally {
                        isLoading.value = false; // 💡 无论成功失败，恢复按钮状态
                    }
                };

                // 自动聚焦
                const userField = ref(null);
                const idField = ref(null);

                // 2. 封装一个公共的聚焦函数
                const focusInput = () => {
                    // 💡 新增：强制聚焦到输入框
                    setTimeout(() => {
                        const input = document.querySelector('input[type="text"]');
                        if (isUsernameLogin.value) {
                            userField.value?.focus();
                        } else {
                            idField.value?.focus();
                        }
                        // if (input) {
                        //     input.focus();
                        // }
                    }, 500); // 延迟 500ms，确保数据加载完成且 DOM 渲染完毕
                };


                // 3. 在 onMounted 中调用，确保页面加载即聚焦
                onMounted(() => {
                    focusInput();
                });

                // 切换登录方式的方法
                const toggleLogin = () => {
                    isUsernameLogin.value = !isUsernameLogin.value;
                    focusInput();
                };

                return {
                    loginForm,
                    isUsernameLogin,
                    isLoading,
                    login,
                    userField,
                    idField,
                    focusInput,
                    toggleLogin
                };
            }
        }).mount('#app');
    </script>
</body>

</html>
