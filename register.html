<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>登录 - 待办事项系统</title>
    <script src="https://unpkg.com/vue@3.5.40/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios@1.7.2/dist/axios.min.js"></script>
    <script src="js/api.js"></script>
    <link rel="shortcut icon" href="assets/images/favicon.ico" type="image/x-icon">
    <link rel="icon" sizes="32x32" href="assets/images/favicon.ico">

    <style>
        body {
            font-family: sans-serif;
            background: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .register-container {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 300px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #3498db;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div id="app" class="register-container">
        <h2>用户注册</h2>
        <form @submit.prevent="register">
            <input name="registerUsername" v-model="registerForm.username" type="text" placeholder="用户名" required>
            <input name="registerPassword" v-model="registerForm.password" type="password" placeholder="密码" required>
            <button type="submit">注册</button>
        </form>

        <div style="margin-top: 15px; text-align: center; font-size: 14px; color: #666;">
            <a href="login.html" style="color: #3498db;">去登录</a>
        </div>

    </div>

    <script>
        const { createApp, reactive, onMounted } = Vue;

        createApp({
            setup() {
                const registerForm = reactive({ username: '', password: '' });

                // 在 register.html 中，将请求路径改为后端注册接口
                const register = async () => {
                    try {
                        const res = await axios.post('https://checklist-backend-bqsf.onrender.com/api/auth/register', {
                            username: registerForm.username,
                            password: registerForm.password
                        });

                        if (res.data.code === 200) {
                            console.log("res:" + res);
                            console.log("res.data:" + res.data);
                            console.log("res.data.data:" + res.data.data);
                            console.log("res.data.value:" + res.data.value);
                            console.log("res.data.data.username:" + res.data.data.username);
                            const newUser = res.data.data;
                            alert(`注册成功！\n您的ID: ${newUser.id}\n用户名: ${newUser.username}\n已自动登录，正在跳转到首页...`);
                            localStorage.setItem('userId', newUser.id);
                            window.location.href = 'index.html';

                        } else {
                            alert(res.data.message);
                        }
                    } catch (e) {
                        if (e.response && e.response.data) {
                            // 如果后端返回了错误信息，直接显示在弹窗里
                            alert("注册失败: " + (e.response.data.message || "服务器内部错误"));
                            console.error("后端详细反馈:", e.response.data);
                        } else {
                            alert("网络连接异常，请检查后端服务是否启动");
                        }
                    }
                };


                // 强制聚焦输入框函数
                const focusInput = () => {
                    // 💡 新增：强制聚焦到输入框
                    setTimeout(() => {
                        const input = document.querySelector('input[type="text"]');
                        if (input) {
                            input.focus();
                        }
                    }, 500); // 延迟 500ms，确保数据加载完成且 DOM 渲染完毕
                };

                // 在 onMounted 中调用，确保页面加载即聚焦
                onMounted(() => {
                    focusInput();
                });

                return { registerForm, register, focusInput };
            }
        }).mount('#app');
    </script>
</body>

</html>
